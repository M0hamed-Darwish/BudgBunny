<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maghawry Tech To-Do</title>
    <link rel="stylesheet" href="Maghawry.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <div class="todo-app">
            
            <div class="stats-container">
                <div class="details">
                    <h2>Keep it Up!</h2>
                    <p>Check off your tasks</p>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                </div>
                <div class="progress-stats">
                    <span id="numbers">0 / 0</span>
                </div>
            </div>

            <h1>To-Do List</h1>

            <form class="input-area" id="todo-form">
                <input type="text" id="input-area" placeholder="Add a new task..." autocomplete="off" />
                <button type="submit" id="add-task-btn"><i class="fa-solid fa-plus"></i></button>
            </form>

            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="todos-container">
                <ul id="task-list"></ul>
                <img class="empty-image" id="empty-img" src="undraw_to_do_list.svg" alt="empty">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="Maghawry.js"></script>
</body>
</html>
