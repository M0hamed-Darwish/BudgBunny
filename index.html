<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignIn</title>
    <link rel="website icon" type="png" href="images/logo.png" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <!-- LOGO SECTION -->

    <div class="img_cont">
      <a href="#"><img src="images/logo.png" alt="BudgBuny_logo" /></a>
    </div>
    <!-- END OF LOGO SECTION -->

    <div class="main_cont">
      <div class="SignItems">
        <button class="TogOpp active" id="SignIn">Sign In</button>
        <span class="divider">|</span>
        <button class="TogOpp" id="SignUp">Sign Up</button>
      </div>

      <!-- SIGN IN FORM SECTION -->
      <form action="" method="get" class="SignInCont">
        <input
          type="text"
          name="username"
          class="inpt"
          id="loginUser"
          placeholder="Username"
          autocomplete="off"
          required
        />
        <input
          type="password"
          name="user_password"
          class="inpt"
          id="loginPass"
          placeholder="Password"
          autocomplete="off"
          required
        />

        <button type="submit" class="btn">SignIn</button>
        <p
          id="errMsg"
          style="color: red; font-size: 16px; margin-top: 10px; display: none"
        >
          Incorrect username or password!
        </p>
      </form>

      <!-- END OF SIGN IN FORM SECTION -->

      <!-- SIGN UP FORM SECTION -->

      <form action="" method="post" class="SignUpCont">
        <input
          type="text"
          name="username"
          class="inpt"
          id="regUser"
          placeholder="Username"
          autocomplete="off"
          required
        />
        <input
          type="email"
          name="user_email"
          class="inpt"
          id="regEmail"
          autocomplete="off"
          placeholder="example@mail.com"
        />
        <input
          type="password"
          name="user_password"
          class="inpt"
          id="regPass"
          placeholder="Password"
          autocomplete="off"
          required
        />

        <button type="submit" class="btn">SignUp</button>
      </form>

      <!-- END OF SIGN UP FORM SECTION -->
    </div>
    <script src="login.js"></script>
  </body>
</html>
